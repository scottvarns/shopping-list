openapi: 3.0.3

info:
  title: Shopping List Authentication API
  description: API for creating user accounts and obtaining JWT bearer tokens.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/auth/signup:
    post:
      tags:
        - Authentication
      summary: Create a user account
      description: Creates a user account and securely stores a BCrypt password hash.
      operationId: signup
      parameters:
        - in: header
          name: X-Correlation-ID
          description: Required UUID used to correlate request processing and logs.
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              newUser:
                summary: New user details
                value:
                  email: user@example.com
                  password: your-password
                  name: Your Name
      responses:
        '201':
          description: User account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                createdUser:
                  summary: Created user
                  value:
                    userId: 1
                    email: user@example.com
                    name: Your Name
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: An account already exists for this email address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate a user
      description: Authenticates a user and returns a JWT bearer token.
      operationId: login
      parameters:
        - in: header
          name: X-Correlation-ID
          description: Required UUID used to correlate request processing and logs.
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              credentials:
                summary: User credentials
                value:
                  email: user@example.com
                  password: your-password
      responses:
        '200':
          description: User authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                bearerToken:
                  summary: JWT bearer token
                  value:
                    token: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyQGV4YW1wbGUuY29tIiwidXNlcklkIjoxfQ.signature
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          example: your-password
        name:
          type: string
          maxLength: 150
          example: Your Name

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: your-password

    AuthenticationResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT bearer token

    UserResponse:
      type: object
      required:
        - userId
        - email
        - name
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Your Name

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Request validation failed
